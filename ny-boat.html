<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>NY Boat</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 1024px; margin: 24px auto; padding: 0 16px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab { padding: 8px 16px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer; border-radius: 6px; font-size: 14px; }
  .tab.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
  video { width: 100%; max-width: 1024px; display: block; background: #000; border-radius: 6px; }
</style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" data-src="ny-boat-hl.mp4">精华版 (ny-boat-hl.mp4)</button>
    <button class="tab" data-src="ny-boat.mp4">完整版 (ny-boat.mp4)</button>
  </div>
  <video id="player" controls autoplay>
    <source src="ny-boat-hl.mp4" type="video/mp4">
  </video>
  <script>
    const player = document.getElementById('player');
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        player.src = btn.dataset.src;
        player.play();
      });
    });
  </script>
</body>
</html>
