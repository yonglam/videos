<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NY Boat</title>
<style>
  :root { --accent: #1f6feb; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 1024px; margin: 24px auto; padding: 0 16px; }
  .tabs { display: flex; gap: 10px; margin-bottom: 14px; }
  .tab {
    flex: 1;
    padding: 14px 16px;
    border: 1px solid #ccc;
    background: #f5f5f5;
    color: #222;
    cursor: pointer;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.2;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  video { width: 100%; max-width: 1024px; display: block; background: #000; border-radius: 6px; }
  @media (max-width: 600px) {
    body { margin: 12px auto; padding: 0 12px; }
    .tab { font-size: 17px; padding: 16px 12px; min-height: 52px; }
  }
</style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" data-src="ny-boat-hl.mp4">精华版</button>
    <button class="tab" data-src="ny-boat.mp4">完整版</button>
  </div>
  <video id="player" controls preload="metadata" playsinline>
    <source src="ny-boat-hl.mp4" type="video/mp4">
  </video>
  <script>
    const player = document.getElementById('player');
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        player.src = btn.dataset.src;
        player.play();
      });
    });
  </script>
</body>
</html>
